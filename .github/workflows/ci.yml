name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Upload lint log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-log
          path: lint.log
          retention-days: 1

      - name: Typecheck desktop
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build desktop
        run: pnpm build

      - name: Typecheck mobile
        run: pnpm mobile:typecheck

      - name: Build mobile web
        run: pnpm mobile:build
