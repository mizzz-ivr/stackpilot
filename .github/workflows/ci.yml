name: CI

on:
  pull_request:
  push:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --fix-lockfile --no-frozen-lockfile

      - name: Sync resolved lockfile to PR branch
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          cp pnpm-lock.yaml /tmp/pnpm-lock.yaml
          git fetch origin "$HEAD_BRANCH"
          git checkout -B "$HEAD_BRANCH" "origin/$HEAD_BRANCH"
          cp /tmp/pnpm-lock.yaml pnpm-lock.yaml
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "依存追加に伴いpnpm lockfileを更新"
          git push origin "HEAD:$HEAD_BRANCH"

      - name: Lint
        run: pnpm lint

      - name: Typecheck desktop
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build desktop
        run: pnpm build

      - name: Typecheck mobile
        run: pnpm mobile:typecheck

      - name: Build mobile web
        run: pnpm mobile:build
