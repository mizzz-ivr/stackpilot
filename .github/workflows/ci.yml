name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck desktop
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build desktop
        run: pnpm build

      - name: Typecheck mobile
        id: mobile-typecheck
        shell: bash
        run: |
          set +e
          pnpm mobile:typecheck 2>&1 | tee mobile-typecheck.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload mobile typecheck log
        if: failure() && steps.mobile-typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mobile-typecheck-log
          path: mobile-typecheck.log
          if-no-files-found: error
          retention-days: 1

      - name: Build mobile web
        run: pnpm mobile:build
