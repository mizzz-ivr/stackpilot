name: CI

on:
  pull_request:
  push:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/mobile-log-actions

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Sync lockfile
        shell: bash
        run: |
          pnpm install --lockfile-only --no-frozen-lockfile
          if ! git diff --quiet -- pnpm-lock.yaml; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add pnpm-lock.yaml
            git commit -m "Clipboard依存をlockfileへ反映"
            git push origin HEAD:feature/mobile-log-actions
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck desktop
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build desktop
        run: pnpm build

      - name: Typecheck mobile
        run: pnpm mobile:typecheck

      - name: Build mobile web
        run: pnpm mobile:build
